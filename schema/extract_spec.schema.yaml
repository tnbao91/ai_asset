# extract_spec.schema.yaml
# Schema for extract_spec.yaml — describes ONE cutout EXTRACTION from a SOURCE ref image.
# OPTIONAL: the extraction can be driven purely by the `EXTRACT: <text>` command / by a SOURCE ref
#   with no text (whole image = sprite sheet) / or by this YAML (fullest form).
# NOTE: EXTRACT keeps the ORIGINAL art of the source image (a cutout), it does NOT restyle it.
#   It never uses the style_guide and never translates through style_tokens/ — that is what makes it
#   different from asset_spec (SYNTHESIZER). This defines fields, NOT real data.
# NOTE: the most pixel-exact cutout is usually a NO-PROMPT operation done by a dedicated
#   background-removal / matting tool (remove.bg, Photoshop "Select Subject"). This spec only drives
#   the image-EDIT path; regenerative editors approximate the cut and may not honor transparency exactly.

source:               # the SOURCE ref image whose actual pixels become the asset.
  type: image         #   (Different from a STYLE ref or a TARGET ref — see the primer's ref-role note.)

target:               # what to pull out of the source image.
  mode:               # element = one named item · sheet = the whole image is a grid of items ·
    #                   ui_teardown = decompose a UI SCREEN into engine-ready pieces (see ui_teardown below)
    enum: [element, sheet, ui_teardown]
  describe:           # for mode=element: which item, in plain words (e.g. "the gold coin, top-right").
    type: string
  grid:               # for mode=sheet: known layout "cols x rows" if you know it; else auto-detect.
    type: string
    examples: ["3x2", "4x4"]

ui_teardown:          # ONLY for mode=ui_teardown. Tear a generated UI screen into reusable engine sprites
  #                     (icons, EMPTY buttons/panels, background) for import into Unity / any game engine.
  #                     Triggered by mode=ui_teardown OR the EXTRACT keywords "ui" / "ui teardown" /
  #                     "for unity" / "for engine" / "tách ui". Scope = UI + background ONLY: characters and
  #                     props on the screen are IGNORED here (cut those with mode=element).
  parts:              # which kinds of pieces to pull. Default = all four.
    enum: [background, panels, buttons, icons]
  empty_widgets:      # buttons/panels are extracted EMPTY — strip the overlaid label text and any icon/badge
    #                   sitting on the widget and fill the face cleanly, so each is a reusable base sprite.
    #                   The stripped icons are extracted as their own separate pieces. Default true.
    #                   NOTE: this is light regenerative FILL, not a pure cutout — verify with CHECK.
    type: bool
  nine_slice:         # add a QUALITATIVE 9-slice hint to empty buttons/panels ("keep the rounded-corner
    #                   region fixed, stretch the flat middle") so they scale in-engine without corner
    #                   distortion. Not exact pixel borders (export resolution is unknown). Default true.
    type: bool
  # background = the bottommost full-bleed layer, pulled as one sprite with all UI removed on top.
  #   If the screen is UI-on-a-solid-fill (no separable scene), report "no separable background".
  # FIRST detect & NAME the real components in the screenshot (energy bar, coin bar, Shop icon, START button
  #   base, "Home tab - selected", ...); the prompt's Extract list = those DETECTED named items, never a generic
  #   category list — naming what is actually present is what makes the teardown accurate.
  # Output = ONE comprehensive teardown prompt (a preservation + named-component-list + scoped-negative contract),
  #   NOT per-piece lines and NO coordinate manifest. The prompt asks for ONE transparent-background PNG holding
  #   every isolated piece spaced apart (a cutout ATLAS / multi-sprite sheet) — never "multiple/independent PNGs"
  #   (a generator returns one image per call). The user slices the atlas in Unity's Sprite Editor.
  # NOTE: this is APPROXIMATE / best-effort, NOT pixel-exact — a generative model re-renders, it does not copy the
  #   source pixels. True pixel-exact teardown = a CV pipeline (detect/segment/cut original pixels/content-aware
  #   fill/9-slice/atlas), OUT OF SCOPE for this prompt-only toolkit.

output:
  background:         # transparent = isolated cutout (default) · keep = leave the original backdrop
    enum: [transparent, keep]
  padding:            # even margin left around the subject after the cut. Default tight.
    enum: [tight, medium, generous]

cleanup:              # bool flags — what to STRIP while keeping the subject's own art intact.
  remove_background:      # the scene/backdrop behind the item. Default true.
    type: bool
  remove_surrounding_ui:  # adjacent buttons, frames, panels, interface chrome around the item.
    type: bool
  remove_cast_shadow:     # ground/scene shadow that does NOT belong to the object itself.
    type: bool
  remove_text_labels:     # captions, numbers, price tags overlaid on the item.
    type: bool

# preserve (implicit, always on): keep the subject's original colors, shading, material, outline and
#   proportions EXACTLY. Do not restyle, recolor, re-light, or add/remove detail.

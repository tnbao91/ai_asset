# style_guide.schema.yaml
# Canonical schema for style_guide.yaml — the Style DNA extracted from reference images.
# This is NOT real data; it defines which fields are valid and which enum values are allowed.
# The ANALYZER (see studio_primer.md §3) must emit a style_guide.yaml conforming to this schema.
# Conventions:
#   - Each field takes ONE enum; except: genre/mood = enum lists, palette.*/color_map.*/background.color = hex lists, negative = free list. Everything else is NEVER a list — platform, rendering, camera included.
#   - Most enums have a matching phrase in style_tokens/. A few descriptive enums (complexity, readability,
#     and the 'none' values) are described directly in English by the synthesizer; a token is not required.
#   - confidence: float 0.0..1.0. < 0.75 = needs human review/override.

version: 1.0

project:
  genre:            # list — game genre
    enum: [casual, puzzle, match3, hyper_casual, midcore, rpg, strategy, simulation, action, adventure, horror]
  platform:         # ONE value — not a list
    enum: [mobile, tablet, cross_platform]

style:
  rendering:        # overall surface treatment
    enum: [semi_painted, fully_painted, flat_vector, cel_shaded, 3d_render, pixel_art, gradient_flat, realistic_painted, inked_comic]
  pixel_register:   # OPTIONAL — only when rendering = pixel_art: which era/register of pixel art
    enum: [8bit, 16bit, hi_bit]
  complexity:
    enum: [very_low, low, medium, high]
  readability:      # how legible/recognizable at small mobile sizes
    enum: [low, medium, high, very_high]
  mood:             # list — emotion/atmosphere
    enum: [cheerful, friendly, playful, calm, premium, energetic, mysterious, cozy, bold, dark, grim, tense, eerie, melancholic]

shape:
  language:         # dominant form language
    enum: [rounded, geometric, organic, angular, mixed]
  corner_radius:
    enum: [none, small, medium, large, pill]
  symmetry:
    enum: [low, medium, high]

palette:            # EACH role is a list of hex "#RRGGBB". Vision reports approximate → user eyedropper-verifies.
  primary:   { type: list_hex }
  secondary: { type: list_hex }
  accent:    { type: list_hex }
  danger:    { type: list_hex }
  neutral:   { type: list_hex }

color_map:          # CONDITIONALLY REQUIRED block — the COLOR LOCK: per-surface hex assignments, as detailed as the refs allow.
  # MUST be filled whenever the refs show UI (screens / buttons / panels / text); it may be omitted ONLY for refs with no UI.
  # Fill ONLY the surfaces the refs actually show (never guess); every value is an eyedropper-verifiable
  # estimate like palette.*. Each entry is a hex list (fill first, then rim/outline/secondary hex if that
  # surface has one) and MAY carry a short scope note after a '#' (e.g. button_trim: gold trim on the
  # positive button ONLY). The SYNTHESIZER states these hex INLINE with each surface (§4) — this is the
  # per-surface twin of palette.* (which stays the coarse role list).
  # -- backdrop & containers --
  background:       { type: list_hex }   # screen/scene backdrop — 1 hex solid or [from, to] gradient
  panel:            { type: list_hex }   # container/popup fill [+ border hex]
  overlay_scrim:    { type: list_hex }   # dim layer behind popups (often a deep tinted blue/purple, NOT plain black)
  # -- buttons & navigation --
  button_primary:   { type: list_hex }   # main CTA fill [+ rim hex]
  button_secondary: { type: list_hex }   # secondary/nav button fill [+ rim hex]
  button_positive:  { type: list_hex }   # confirm/claim/free button fill [+ rim hex]
  button_danger:    { type: list_hex }   # destructive/cancel fill [+ rim hex]
  button_trim:      { type: list_hex }   # shared trim/border color + scope note saying WHICH buttons carry it
  tab:              { type: list_hex }   # tab bar: selected fill, then unselected fill (the classic drift spot)
  # -- control widgets (hex twins of the `controls` block, which only stores color ROLES) --
  toggle:           { type: list_hex }   # track ON, track OFF, knob
  slider:           { type: list_hex }   # fill, track, handle
  checkbox:         { type: list_hex }   # box fill, tick/check color
  progress_fill:    { type: list_hex }   # progress-bar fill [+ track hex]
  # -- text & icons --
  text_title:       { type: list_hex }   # title fill [+ outline hex]
  text_label:       { type: list_hex }   # body/label ink [+ outline hex]
  icon_palette:     { type: list_hex }   # 2-4 dominant icon colors
  currency:         { type: list_hex }   # one hex per currency type (coin gold, gem blue…)
  # -- decor & accents --
  banner:           { type: list_hex }   # ribbon/title banner fill [+ edge/shade hex]
  badge_notification: { type: list_hex } # notification dot/badge fill [+ number ink]
  outline_ink:      { type: list_hex }   # the actual outline color (complements outline.color enum)
  shadow_tint:      { type: list_hex }   # drop/contact shadow tint (stylized art often shades in color rather than gray-black — but match the ref)
  glow_accent:      { type: list_hex }   # bloom/glow/sparkle tint

material:           # perceived material of each surface type
  button:
    enum: [glossy_plastic, matte_plastic, soft_plastic, metallic, glass, wood, fabric, candy_jelly, painted]
  icon:
    enum: [painted, flat, glossy, metallic, clay_3d, sticker]
  currency:
    enum: [polished_gold, brushed_gold, silver, gem_crystal, coin_flat, painted]
  container:        # panel/popup/frame
    enum: [soft_plastic, wood, stone, parchment, glass, painted_card, metal_frame]
  character:        # OPTIONAL — character surface treatment (skin/hair/cloth share one treatment). Only when refs contain characters.
    enum: [painted_soft, cel_flat, clay_3d, vinyl_toy, toon_3d, plush_felt, semi_real, realistic_painted]
  environment:      # OPTIONAL — scenery surface treatment. Only when refs contain scenes/backgrounds.
    enum: [painted_backdrop, flat_vector_scene, stylized_3d, watercolor_wash]

lighting:
  direction:
    enum: [top, top_left, top_right, front, ambient, side, below]
  contrast:         # OPTIONAL — fill only when the ref's light is notably soft or hard; omit = unremarkable contrast
    enum: [soft, medium, hard]
  highlight:
    enum: [none, soft, medium, strong]
  shadow:
    enum: [none, soft_bottom, hard_bottom, drop_shadow, inner_shadow]

outline:
  enabled:          { type: bool }
  thickness:
    enum: [none, thin, medium, thick]
  color:
    enum: [darker_variant, black, white, none, complementary]

effects:             # each effect graded on the same none/soft/medium/strong scale as lighting.highlight; 'none' = effect absent (nothing emitted)
  bevel:             { enum: [none, soft, medium, strong] }
  ambient_occlusion: { enum: [none, soft, medium, strong] }
  bloom:             { enum: [none, soft, medium, strong] }
  inner_glow:        { enum: [none, soft, medium, strong] }
  gradient_overlay:  { enum: [none, soft, medium, strong] }

icon:               # conventions for icon-type assets
  perspective:
    enum: [front, three_quarter, top_down, isometric]
  padding:
    enum: [tight, medium, generous]
  composition:
    enum: [centered, rule_of_thirds, diagonal]
  saturation:       # icon color treatment — how saturated/tinted the icon glyph reads (independent of material.icon)
    enum: [monochrome, low, normal, vivid]

layout:             # screen layout conventions
  spacing:
    enum: [tight, medium, large]
  density:
    enum: [low, medium, high]
  safe_area:
    enum: [mobile, tablet, none]

button:
  depth:
    enum: [flat, low, medium, high]
  gloss:
    enum: [none, low, medium, high]

typography:         # OPTIONAL block — UI text/label style. Fill ONLY when the refs contain UI text; otherwise omit entirely (never guess).
  font_feel:        # the overall letterform character
    enum: [rounded_sans, bold_display, geometric_sans, handwritten, serif_storybook, pixel]
  weight:
    enum: [regular, medium, bold, heavy]
  case:             # dominant casing of titles/labels
    enum: [uppercase, title_case, sentence_case]
  treatment:        # how labels are finished (matches the surface finish)
    enum: [plain, outlined, drop_shadow, inner_shadow, embossed]
  color_role:       # which palette role the text ink uses
    enum: [neutral, primary, secondary, accent]

controls:           # OPTIONAL block — interactive UI widget conventions. Fill ONLY when the refs contain the matching widget; otherwise omit that widget (never guess).
  # Widgets carry NO material enum of their own — they reuse material.button / material.container +
  # outline + shape; only their structural conventions (track/knob/fill + which palette role marks a
  # state) live here. Tab / dropdown / input inherit the same track+fill+handle logic (no extra enum).
  toggle:
    track_shape:    { enum: [pill, rounded_rect] }
    on_color_role:  { enum: [accent, secondary, primary, danger] }   # track color when ON
    off_color_role: { enum: [neutral, secondary] }                   # track color when OFF
    knob:           { enum: [circle_glossy, circle_matte, circle_metallic] }
  slider:
    track_shape:    { enum: [pill, thin_rounded] }
    fill_color_role: { enum: [accent, primary, secondary] }
    handle:         { enum: [circle_glossy, circle_matte, knob_3d] }
  checkbox:
    shape:          { enum: [rounded_square, circle] }
    check_style:    { enum: [tick, fill, glow] }
  progress_bar:
    track_shape:    { enum: [pill, rounded_rect] }
    fill_color_role: { enum: [accent, primary, secondary] }

character:          # OPTIONAL block — character style conventions. Fill ONLY when the refs contain characters; otherwise omit entirely (never guess).
  proportions:      # head-to-body ratio, the main character style lever
    enum: [chibi_2head, toon_3head, stylized_4head, semi_real_6head]
  feature_exaggeration:   # how far eyes/hands/silhouette are pushed from realistic
    enum: [low, medium, high]

environment:        # OPTIONAL block — scene/background style conventions. Fill ONLY when the refs contain scenes; otherwise omit entirely.
  depth:
    enum: [flat_backdrop, two_layer, layered_parallax, full_scene]
  atmosphere:
    enum: [clear, soft_haze, glow_dust, dramatic, fog, gloom, storm]

camera:             # dominant viewing angle across the refs (phrases in style_tokens/layout_negative.yaml). Flat UI screens/mockups = orthographic; eye_level / close_up are for scenes & characters.
  enum: [orthographic, isometric, top_down, three_quarter, close_up, eye_level]

canvas:             # dominant canvas of the STYLE refs — the ANALYZER reads it off the ref images themselves (never assume portrait)
  orientation:      # from the ref's actual width vs height
    enum: [portrait, landscape, square]
  aspect_ratio:     # free "W:H" estimate of the ref canvas (e.g. "9:16", "16:9", "4:3", "1:1")
    type: string

background:           # asset background (solid/gradient). Optional — leave empty if the ref has a transparent background.
  type:
    enum: [solid, gradient, scene, transparent]
  color:              # 1..2 hex; for gradient use [from, to]
    type: list_hex

negative:           # free list — attributes visibly ABSENT from / contradicting the refs (never a stock list; see §3 rule 5)
  type: list_free
  examples_cute_ref:   [realistic, gritty, noisy_texture, dark_theme, sharp_corner, thin_icon]
  examples_gritty_ref: [cute, pastel_palette, toy_gloss, flat_design, bright_cheerful]

confidence:         # confidence per dimension group (0.0..1.0). < 0.75 -> user reviews/overrides.
  shape:     { type: float_0_1 }
  palette:   { type: float_0_1 }
  color_map: { type: float_0_1 }   # only when the color_map block is filled
  rendering: { type: float_0_1 }
  material:  { type: float_0_1 }
  lighting:  { type: float_0_1 }
  character:   { type: float_0_1 }   # only when the character block is filled
  environment: { type: float_0_1 }   # only when the environment block is filled
  typography:  { type: float_0_1 }   # only when the typography block is filled
  controls:    { type: float_0_1 }   # only when the controls block is filled

# style_tokens/render_shape.yaml
# Maps style.rendering, shape.*, icon.*, button.*, effects.* -> English phrases for the prompt.
# Source: "Casual Style Dictionary" (Render & Finish, Form & Proportions, Composition).

rendering:
  semi_painted:
    phrase: "semi-painted render with a stylized baked texture look — hand-painted lighting baked onto clean 3D-like shapes"
    notes: "Katya 'Stylized baked texture look' = secret ingredient to mimic 3D volume"
  fully_painted:
    phrase: "fully hand-painted illustration with visible painterly brush strokes and rich texture"
  flat_vector:
    phrase: "clean flat vector style, solid shapes, no gradients"
  cel_shaded:
    phrase: "cel-shaded cartoon style with flat shadow bands"
  3d_render:
    phrase: "stylized 3D render, clean glossy surfaces, high-end digital illustration finish"
  pixel_art:
    phrase: "crisp retro pixel art, limited palette, hard pixel edges"
    notes: "When rendering = pixel_art, also pull modifiers from the pixel_art group below (register/grid/outline/palette cap)."
  gradient_flat:
    phrase: "flat shapes with smooth airbrushed gradients (soft, blended transitions)"
  realistic_painted:
    phrase: "realistic painted rendering — natural light behavior, believable surface texture and weathering, painterly but grounded (not a photo)"
  inked_comic:
    phrase: "inked comic style — confident ink linework over flat or lightly shaded fills"

shape_language:
  rounded:
    phrase: "rounded, hand-rolled silhouettes with subtle asymmetry"
    notes: "Banana2 'Hand-Rolled silhouette': avoid sterile mathematical geometry"
  geometric:
    phrase: "clean geometric shapes with precise edges"
  organic:
    phrase: "organic, slightly squashed asymmetrical forms"
  angular:
    phrase: "bold angular shapes with defined corners"
  mixed:
    phrase: "mix of rounded bases with a few sharp accents"

corner_radius:
  # Measure the radius against the ref — crisp arcade cards read `small`, candy-casual reads `large`; don't default to medium.
  none:    { phrase: "sharp square corners" }
  small:   { phrase: "slightly rounded corners, crisp and tight" }
  medium:  { phrase: "rounded corners" }
  large:   { phrase: "large soft rounded corners" }
  pill:    { phrase: "fully pill-shaped rounded ends" }

shape_slant:   # OPTIONAL shape.slant — skew/tilt of panels/tabs/banners; absent = everything sits straight
  slight: { phrase: "slightly slanted, forward-leaning panels and tabs" }
  strong: { phrase: "strongly skewed parallelogram panels, tabs and banners — dynamic diagonal energy, edges cut at an angle (NOT straight verticals)" }

symmetry:
  low:    { phrase: "loose, hand-made asymmetry" }
  medium: { phrase: "mostly balanced with subtle hand-made variation" }
  high:   { phrase: "clean symmetrical, well-balanced composition" }

# Form & proportions (Katya, Form & Proportions) — use when you need to push the inflated/chunky feel
form_proportions:
  volumetric:  { phrase: "volumetric, inflated forms with stable 3D mass" }
  chunky:      { phrase: "stubby, squat, chunky proportions, thick and compressed" }
  bouncy:      { phrase: "bouncy, plump, bumpy surface with soft puffiness" }
  beveled:     { phrase: "softened edges and beveled corner roundness" }
  wrinkled:    { phrase: "wrinkled / concave structural bends, dents and soft mesh folds" }
    # Katya Form & Proportions — cloth and prop folds
  mega_chunk:  { phrase: "mega-chunk logic: rims and lines 3-5x thicker than realistic, no thin lines — thick sausage-like tubes" }
    # Banana2 CRITICAL rule for the sculpted-gloss icon style
_form_tips:
  - "Katya nuance: 'Volume' = stable volumetric mass · 'Shape' = flatter silhouettes · 'Form' = architectural rigor (use for buildings/structured props)."

# Pixel-art modifiers ("Retro 8-bit Pixel Art prompts Collection") — ONLY when style.rendering = pixel_art.
# register maps style_guide.style.pixel_register; grid/outline_px/palette_cap are appended per asset.
pixel_art:
  register_8bit:   { phrase: "8-bit aesthetic, low-resolution pixel grid" }
  register_16bit:  { phrase: "16-bit pixel art with chunky shading blocks, soft dithering and subtle retro color-banding" }
  register_hi_bit: { phrase: "high-resolution, sharp-edged modern pixel art" }
  grid:            { phrase: "on a <W>x<H> pixel grid (e.g. 32x32 / 64x64), grid-aligned, pixel-perfect" }
  outline_px:      { phrase: "precise single-pixel borders on all features" }
  palette_cap:     { phrase: "reduce color complexity to 4-16 vibrant colors maximum" }
  _note: "Small sprites must stay 'readable at small size'. Pair with the anti_aliasing negative (layout_negative.yaml). CRT/scanline/glitch effects: include ONLY when the ref visibly shows them — then name them explicitly (e.g. 'subtle CRT scanline overlay'); otherwise skip."

icon_perspective:
  front:        { phrase: "straight front view, eye-level" }
  three_quarter: { phrase: "3/4 view angle" }
  top_down:     { phrase: "top-down view" }
  isometric:    { phrase: "isometric projection (classic 2.5D game view)" }

icon_padding:
  tight:    { phrase: "tight framing, minimal padding" }
  medium:   { phrase: "balanced padding around the subject" }
  generous: { phrase: "generous padding, subject centered with breathing room (keep ~70% of surface clean)" }

icon_composition:
  centered:       { phrase: "subject centered in frame" }
  rule_of_thirds: { phrase: "composed on rule-of-thirds" }
  diagonal:       { phrase: "playful diagonal tilt for tall items" }

button_depth:
  flat:   { phrase: "flat button, no depth" }
  low:    { phrase: "subtle raised button depth" }
  medium: { phrase: "clearly raised button with medium 3D depth" }
  high:   { phrase: "strongly extruded chunky button with bold depth" }

button_gloss:
  none:   { phrase: "no gloss, matte button face" }
  low:    { phrase: "faint gloss" }
  medium: { phrase: "moderate glossy highlight on the button face" }
  high:   { phrase: "high gloss, shiny wet-look button highlight" }

effects:             # graded on none/soft/medium/strong; 'none' emits nothing
  bevel:
    soft:   { phrase: "very subtle soft bevel on edges" }
    medium: { phrase: "soft beveled edges" }
    strong: { phrase: "pronounced chunky beveled edges" }
  ambient_occlusion:
    soft:   { phrase: "faint ambient occlusion in crevices" }
    medium: { phrase: "soft contact shadows / ambient occlusion in crevices" }
    strong: { phrase: "deep ambient occlusion, strong contact shadows in crevices" }
  bloom:
    soft:   { phrase: "faint bloom on bright areas" }
    medium: { phrase: "gentle bloom / soft glow halo on bright areas" }
    strong: { phrase: "strong bloom, bright glowing halo on highlights" }
  inner_glow:
    soft:   { phrase: "subtle inner glow" }
    medium: { phrase: "soft inner glow along edges" }
    strong: { phrase: "strong inner glow rim" }
  gradient_overlay:
    soft:   { phrase: "gentle gradient overlay" }
    medium: { phrase: "smooth gradient overlay" }
    strong: { phrase: "bold gradient overlay with clear tonal shift" }

icon_saturation:     # icon color treatment (independent of icon material)
  monochrome: { phrase: "near-monochrome icons, single-hue tint, low-chroma monochrome feel" }
  low:        { phrase: "low-saturation, muted desaturated icon palette" }
  normal:     { phrase: "natural, balanced icon saturation" }
  vivid:      { phrase: "vivid, high-saturation punchy icon colors" }

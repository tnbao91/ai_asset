# style_tokens/layout_negative.yaml
# Maps layout.*, camera/composition, and the NEGATIVE block.
# Source: "Casual Style Dictionary" (Composition & Grid, Block List) + Banana2 negative prompt.

layout_spacing:
  tight:  { phrase: "tight spacing between elements" }
  medium: { phrase: "balanced spacing" }
  large:  { phrase: "generous spacing, airy layout" }

layout_density:
  low:    { phrase: "low density, clean and uncluttered (keep empty space)" }
  medium: { phrase: "moderate density" }
  high:   { phrase: "dense, information-rich layout" }

layout_safe_area:
  mobile: { phrase: "composed within a mobile safe area, key elements away from screen edges" }
  tablet: { phrase: "composed within a tablet safe area" }
  none:   { phrase: "full-bleed composition" }

# Camera / composition (Composition & Grid) — for screens / icon sheets
camera:
  orthographic: { phrase: "strict orthographic camera" }
  isometric:    { phrase: "isometric projection (classic 2.5D game view)" }
  top_down:     { phrase: "top-down view" }
  three_quarter: { phrase: "3/4 view" }
  close_up:     { phrase: "close-up shot" }
  eye_level:    { phrase: "eye-level shot" }
sheet:
  layout_grid:  { phrase: "asset sheet layout, <N> columns x <M> rows, consistent items" }
    # Katya: use the word 'consistent' to keep the same object across multiple angles on one sheet
  aspect_ratio: { phrase: "aspect ratio <W:H>" }

# Layout-reference lock — the OUTPUT-facing twin of character_identity_lock.
# Emitted ONLY when a TARGET ref IMAGE is attached to ASSET: / BACKGROUND: / OBJECT:
# (never for YAML/text specs). Mirrors identity lock: the clause must sit in the prose so the
# downstream image generator — not just the primer LLM — reads "this image is layout only".
layout_reference_lock:
  phrase: "Use the attached image ONLY as a layout / composition reference — copy the arrangement, element positions, counts and proportions from it, but do NOT copy its colors, materials, lighting, textures, linework or art style. All visual styling follows the description above (the style guide)."
  # Append this second sentence only if the user also attaches a separate style/color reference:
  with_style_ref: "If a separate style / color reference image is also attached, take all styling from that one and use this layout image for structure only."

# Context-setter to open the prompt (Katya: start with a clear command)
context_starter:
  - "Generate / create a casual mobile game art asset, ..."
  - "Setting the game-asset context at the very start helps the model understand it is drawing a game asset, not an ordinary picture."

# ============ NEGATIVE / BLOCK LIST ============
# style_guide.negative -> avoidance phrases. Common Katya blocks pre-bundled.
negative_map:
  realistic:          "NO photorealism, NO realistic textures"
  metallic_realistic: "NO realistic metal, NO raytracing"
  dark_theme:         "NO dark theme, NO black background unless specified"
  sharp_corner:       "NO sharp geometric intersections, NO sharp points"
  flat_design:        "NO flat 2D, NO flat design"
  thin_icon:          "NO thin lines, NO thin edges, NO wire-like lines"
  gritty:             "NO gritty textures, NO grunge"
  noisy_texture:      "NO noise, NO grain, NO procedural noise, NO microscopic details"
  broken_anatomy:     "NO extra fingers, NO extra limbs, NO deformed hands"          # characters
  busy_background:    "NO clutter, NO busy detail competing with the foreground"      # backgrounds
  perspective_distortion: "NO perspective distortion, NO vanishing points (keep strict isometry)"   # Katya: add to the negative to enhance isometry
  anti_aliasing:      "NO anti-aliasing, NO blur, NO modern post-processing — pure pixel art"       # pixel_art rendering only

# Katya's standard block list (paste as-is to strip linework + dirt + noise):
katya_line_removal: >
  NO lineart, NO outlines, NO ink, NO stroke, NO contour lines, NO vector lines,
  NO cel shading, NO drawn lines, NO black borders, NO sketch, NO comic style, NO anime, NO manga
katya_general_negatives: >
  missing, hidden, melted silhouette, muddy, muted, dull, pale, washed out, gray, black,
  desaturated, low contrast, monochromatic, gritty textures, grain, noise, grunge,
  blurred, out of focus, depth of field, cropped, out of frame, dry chalky texture,
  visible brushstrokes, photorealism, realistic, raw 3D render, cold 3D, filling empty space,
  high frequency patterns, small ripples, text, UI, UX, GUI,
  watermark, signature, jpeg artifacts

# Curated "Avoid:" tails distilled from the list above (primer §4 negative rule uses them):
negative_tail_always: "watermark, signature, jpeg artifacts, blurry / out of focus, cropped / out of frame"   # append to EVERY prompt
negative_tail_non_screen: "text, UI / UX / GUI overlays, interface chrome"   # single assets only (icon/button/prop/character/object/background) — a screen IS UI, skip it there
negative_tail_character: "extra fingers, extra or missing limbs, deformed hands, asymmetric eyes, broken anatomy"   # characters with normal anatomy (feature_exaggeration low/medium) — append alongside the non-screen tail
negative_tail_character_simplified: "distinct fingers or toes, paws with toes, intricate fur, tiny separate details"   # mitten/stump styles (feature_exaggeration high) — Banana2 Zero-Digits: hands/feet are smooth rounded stumps, so 'no EXTRA fingers' is the wrong guard; use this tail INSTEAD of negative_tail_character
negative_tail_background: "characters, creatures, foreground objects blocking the view"   # backgrounds only — keep the backdrop empty of actors (they are composited later)

_note: "Katya's note: not every model supports a negative prompt; image generators read negatives as an 'Avoid: ...' sentence."

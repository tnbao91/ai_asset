# style_tokens/light_color.yaml
# Maps lighting.*, outline.*, palette mood, project.mood -> English phrases for the prompt.
# Source: "Casual Style Dictionary" (Light & Physics, Color Palette, Atmosphere & Vibe).

lighting_direction:
  top:       { phrase: "soft directional scene lighting from the top" }
  top_left:  { phrase: "soft warm key light from the top-left" }
  top_right: { phrase: "soft warm key light from the top-right" }
  front:     { phrase: "soft frontal lighting, even and clean" }
  ambient:   { phrase: "diffused ambient lighting, soft and even" }

lighting_highlight:
  none:   { phrase: "no strong highlights" }
  soft:   { phrase: "soft gentle highlights" }
  medium: { phrase: "clear highlights" }
  strong: { phrase: "strong bright highlights with crisp specular pops" }

lighting_shadow:
  none:        { phrase: "no shadows" }
  soft_bottom: { phrase: "soft contact shadow at the bottom" }
  hard_bottom: { phrase: "defined drop shadow under the object" }
  drop_shadow: { phrase: "clean soft drop shadow" }
  inner_shadow: { phrase: "subtle inner shadow for depth" }

# Advanced lighting effects (Light & Physics) — add for a "juicy" look
lighting_extra:
  rim_light: { phrase: "soft bright rim light along the edges (Fresnel rim) for a juicy pop" }
    # Banana2: 'Rim & Reflex Light' bright blue bounce from bottom-right works very well
  bounce_fill: { phrase: "soft colored bounce light filling the shadows" }
  sss: { phrase: "subtle subsurface scattering — a soft translucent glow on candy / jelly / skin materials" }
    # Katya tip: 'additional lighting effects like Fresnel or SSS'; core of the toon_3d character look

outline:
  enabled_true:  { phrase: "clean even outline around shapes" }
  enabled_false: { phrase: "no outline (NO lineart, NO stroke)" }
  thickness_thin:   { phrase: "thin outline" }
  thickness_medium: { phrase: "medium outline" }
  thickness_thick:  { phrase: "bold thick outline" }
  color_darker_variant: { phrase: "outline in a darker shade of the fill color" }
  color_black:          { phrase: "black outline" }
  color_white:          { phrase: "white outline" }
  color_complementary:  { phrase: "complementary-color outline" }

# Color treatment (Color Palette) — describes HOW colors are used; hex comes from style_guide
color_treatment:
  clean_pure:   { phrase: "clean, pure, solid colors (avoid dirty mixed shades)" }
  juicy_vibrant: { phrase: "juicy, vibrant, vivid high-saturation colors" }
  candy:        { phrase: "bright multicolored candy palette" }
  rich_precious: { phrase: "rich, precious, expensive high-value coloring" }
  warm:         { phrase: "warm tone bias" }
  cool:         { phrase: "cool tone bias" }
_color_tips:
  - "You can pin an exact color with hex, e.g. 'warm key light, hex #FFF9E6'."
  - "Solid background: 'clean and solid background'. Gradient: 'clean gradient background from <A> to <B>'."

# ============ COLOR LOCK (style_guide.color_map -> per-surface hex emission) ============
# The strongest text-side color-fidelity device: hex attached to the NAMED surface at the moment that
# surface is described beats a detached palette list at the end of the prompt. Pairs with the strict
# CHECK palette comparison; hex values are eyedropper-verified via UPDATE:.
color_lock:
  contract: "Color fidelity is critical: use EXACTLY the hex values stated for each surface — do not shift hue, saturation or brightness, and do not introduce any color that is not listed."
  per_surface_rule: "state each color_map hex INLINE with its surface as that surface is described (e.g. 'the PLAY button fill is exactly #6CC24A with a #FFC93C rim', 'the sky background is exactly #56AEED') — never as a detached color list at the end of the prompt"
  scope_note_rule: "carry each entry's scope note into the prompt as a restriction (e.g. 'the gold trim belongs to the positive button ONLY — blue buttons keep a thin darker-blue outline')"
  negatives: "no invented accent colors, no color drift or hue shift, no oversaturation, no extra trim or border colors beyond those specified"
  # notes: emit the contract sentence ONCE, right before the first per-surface hex. Surfaces absent from
  #   color_map fall back to palette role + hex (§4 rule 4). Applies to ALL four generate branches.

# background (style_guide.background.type) -> background phrase. Color comes from background.color (hex).
background:
  solid:       { phrase: "clean solid background color" }            # + state hex, e.g. "solid #314C88 background"
  gradient:    { phrase: "clean gradient background (from one color to another)" }  # e.g. "from light-blue to magenta"
  scene:       { phrase: "soft blurred game scene behind, dimmed" }
  transparent: { phrase: "isolated on a transparent background (no backdrop)" }
_bg_tip: "Katya: solid background = 'clean and solid background'; gradient = 'clean gradient background from <A> to <B>'."

# project.mood / style.mood -> atmosphere tokens (Atmosphere & Vibe)
mood:
  cheerful:  { phrase: "cheerful, friendly mood" }
  friendly:  { phrase: "warm friendly vibe" }
  playful:   { phrase: "playful, pop, juicy feel" }
  calm:      { phrase: "calm, cozy, safe atmosphere" }
  premium:   { phrase: "premium, satisfying, high-value feel" }
  energetic: { phrase: "energetic, punchy, dynamic" }
  mysterious: { phrase: "whimsical, fairytale, slightly mysterious mood" }
  cozy:      { phrase: "cozy, soft, safe" }
  bold:      { phrase: "bold, clickable, attention-grabbing" }

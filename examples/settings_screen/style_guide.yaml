# style_guide.yaml — Style DNA (analyzer output, manually reviewed).
# Clean and schema-conformant (schema/style_guide.schema.yaml). Used as input for the synthesizer.
version: 1.0

project:
  genre: [casual, puzzle]
  platform: mobile

style:
  rendering: semi_painted
  complexity: low
  readability: very_high
  mood: [cheerful, friendly]

shape:
  language: rounded
  corner_radius: large
  symmetry: high

palette:                      # hex values eyedropper-verified
  primary:   ["#0D6DB8"]
  secondary: ["#42D70F"]
  accent:    ["#FFD34A"]
  danger:    ["#FF4D4D"]
  neutral:   ["#FFFFFF"]

material:
  button: glossy_plastic
  icon: painted
  currency: polished_gold
  container: soft_plastic

lighting:
  direction: top
  highlight: strong
  shadow: soft_bottom

outline:
  enabled: true
  thickness: medium
  color: darker_variant

effects:
  bevel: true
  ambient_occlusion: false
  bloom: false
  inner_glow: false
  gradient_overlay: false

icon:
  perspective: front
  padding: generous
  composition: centered

layout:
  spacing: large
  density: low
  safe_area: mobile

button:
  depth: medium
  gloss: high

background:                   # style-level: UI kit exported on a transparent background
  type: transparent
  color: []

negative: [realistic, metallic_realistic, dark_theme, sharp_corner, flat_design, thin_icon]

confidence:
  shape: 0.99
  palette: 0.96
  rendering: 0.91
  material: 0.78
  lighting: 0.73

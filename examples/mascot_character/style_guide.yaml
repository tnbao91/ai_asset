# style_guide.yaml — Style DNA. Same game as examples/settings_screen/, extended with the OPTIONAL
# character block + material.character (set via UPDATE: after a second STYLE pass on character refs;
# confidence 1.0 = human-final). The environment block is omitted — no scene refs were analyzed.
# Clean and schema-conformant (schema/style_guide.schema.yaml). Used as input for the synthesizer.
version: 1.0

project:
  genre: [casual, puzzle]
  platform: mobile

style:
  rendering: semi_painted
  complexity: low
  readability: very_high
  mood: [cheerful, friendly]

shape:
  language: rounded
  corner_radius: large
  symmetry: high

palette:                      # hex values eyedropper-verified
  primary:   ["#0D6DB8"]
  secondary: ["#42D70F"]
  accent:    ["#FFD34A"]
  danger:    ["#FF4D4D"]
  neutral:   ["#FFFFFF"]

material:
  button: glossy_plastic
  icon: painted
  currency: polished_gold
  container: soft_plastic
  character: painted_soft     # OPTIONAL — filled from character refs

lighting:
  direction: top
  highlight: strong
  shadow: soft_bottom

outline:
  enabled: true
  thickness: medium
  color: darker_variant

effects:
  bevel: medium
  ambient_occlusion: none
  bloom: none
  inner_glow: none
  gradient_overlay: none

icon:
  perspective: front
  padding: generous
  composition: centered

layout:
  spacing: large
  density: low
  safe_area: mobile

button:
  depth: medium
  gloss: high

character:                    # OPTIONAL block — filled from character refs
  proportions: toon_3head
  feature_exaggeration: medium

camera: three_quarter

canvas:                       # read off the STYLE ref image: a portrait phone screenshot
  orientation: portrait
  aspect_ratio: "9:16"

background:                   # style-level: assets exported on a transparent background
  type: transparent
  color: []

negative: [realistic, metallic_realistic, dark_theme, sharp_corner, flat_design, thin_icon]

confidence:
  shape: 0.99
  palette: 0.96
  rendering: 0.91
  material: 0.78
  lighting: 0.73
  character: 1.0              # set human-final via UPDATE:

# character_spec.pose_variation.yaml — POSE VARIATION run for the same character, command `CHARACTER:`.
# character_ref is set (and the generated Pip image is attached in the chat as a CHARACTER ref),
# so the synthesizer emits an image-EDIT prompt (see prompt_pose_variation.txt).
name: Pip
character_ref: pip_base.png   # the already-generated character image, attached in the chat
pose: jumping in the air with both paws raised in celebration
expression: eyes closed, joyful open-mouth smile

background: transparent
aspect_ratio: "3:4"
style_ref: style_guide.yaml
